workflows:
  ios-unsigned:
    name: iOS Unsigned Build (Sideloadly)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Get Flutter packages
        script: |
          flutter clean
          flutter pub get

      - name: Install CocoaPods dependencies
        script: |
          cd ios
          pod install --repo-update
          cd ..

      - name: Flutter build (no codesign)
        script: |
          flutter build ios --release --no-codesign

      - name: Create unsigned IPA
        script: |
          mkdir -p build/ios/iphoneos/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r -q sero-unsigned.ipa Payload
          cd ../../../

    artifacts:
      - build/ios/iphoneos/sero-unsigned.ipa

    publishing:
      email:
        recipients:
          - hamadabusiness199@gmail.com
        notify:
          success: true
          failure: true
